services:
  blazor-portfolio:
    image: blazor-portfolio:latest
    ports:
      - "8080:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://0.0.0.0:5000
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 3s
      retries: 30
      start_period: 10s
